good fortune, and cure one’s illnesses. By touching a tulasi leaf to one’s head, one becomes righteous. And any person — even one who follows no rule of life, even a liar and a cheat — can purify all the worlds by honouring tulasi.", "cite": "Skanda Purana"}, {"t": "p", "text": "One verse; so many mercies. Let us walk through them."}]}, {"part": "Part Eleven — Fruits for This Life", "pnum": 11, "title": "Health, Protection, and Prosperity", "id": "part-eleven-fruits-for-this-life-health-protection-and-prosperity", "words": 206, "blocks": [{"t": "p", "text": "Look at what she tends in this very life."}, {"t": "p", "text": "Your health. “Cure one’s illnesses,” the verse says plainly. The tulasi the world prizes as a medicine, the scriptures honour as a healer of body and spirit alike."}, {"t": "p", "text": "Your protection. The verse speaks of overcoming one’s enemies — but understand it rightly: not as a weapon you wield against others, but as a shelter drawn around you. Whatever assails you — open foes, hidden dangers, the forces that quietly wear a life down — she stands as a shield. (Recall the wants‑list of Part One: protection from what stands against us. Here it is answered.)"}, {"t": "p", "text": "Your prosperity. “Award good fortune.” This is Artha: the scriptures say she increases one’s means, lifts one’s standing, and drives out poverty — not riches for greed’s sake, but an honest sufficiency, earned in harmony with dharma, so the gnawing worry of want no longer rules your days."}, {"t": "p", "text": "And the home itself is touched. The Brhan-naradiya Purana promises:"}, {"t": "scripture", "text": "All kinds of auspiciousness go on increasing, day by day, in the home where the tulasi plant is carefully kept and worshipped.", "cite": "Brhan-naradiya Purana"}, {"t": "p", "text": "Health, safety, sufficiency — the very things we walk into temples to beg for. One leaf, the scriptures say, reaches them all."}]}, {"part": "Part Eleven — Fruits for This Life", "pnum": 11, "title": "Even Your Stars Bow", "id": "part-eleven-fruits-for-this-life-even-your-stars-bow", "words": 508, "blocks": [{"t": "p", "text": "And there is a fruit here that may surprise you — one that reaches even into your destiny itself."}, {"t": "p", "text": "Many of us carry a quiet dread of the horoscope — of Rahu, of Ketu, of Saturn’s slow shadow, of some hard season the stars are said to hold in store. And let us be fair to it: astrology is a true science — a limb of the Vedas, given by the Lord Himself; where it seems to fail, the fault is most often in the hands that misuse it, not in the science. It reads the karma we are born to meet in this life — the very portion already allotted to us. But it reads only what is already written — and the scriptures reveal something higher: the One who wrote it can also rewrite it. The Vaisakha-mahatmya promises:"}, {"t": "scripture", "text": "Just as haritaki, the myrobalan, cures every kind of disease, so Tulasi alleviates poverty, disease, and the sinful reactions that lie at their root.", "cite": "Vaisakha-mahatmya"}, {"t": "p", "text": "And of the planets themselves, the Skanda Purana — in the words of the sage Vasistha to King Mandhata — declares:"}, {"t": "scripture", "text": "All the obstacles and dangers that have befallen a person are dispelled when he touches to his head the sacred clay from the root of a Tulasi plant; and all the stars and planets become pleased with him.", "cite": "Skanda Purana"}, {"t": "p", "text": "For the planets are not your masters — they are the Lord’s servants. When the Master is pleased, His servants are pleased of themselves. This is the quiet secret every wise astrologer knows: a soul surrendered to the Supreme Lord is no longer bound by his chart. Krishna says it plainly in the Bhagavad‑gita:"}, {"t": "verse", "lines": ["ye yathā māṁ prapadyante", "tāṁs tathaiva bhajāmy aham", "mama vartmānuvartante", "manuṣyāḥ pārtha sarvaśaḥ"], "cite": "Bhagavad‑gita 4.11"}, {"t": "p", "text": "What it means: “As all surrender unto Me, so I reward them; everyone, in every way, follows My path.” Surrender fully, and the Lord Himself takes charge of your destiny — and what He arranges, no planet can overrule."}, {"t": "p", "text": "I once saw this proven with my own eyes. An expert astrologer read a young man’s chart and grew grave, for the years it showed ahead looked hard. Then someone mentioned that the young man had given his whole life to the Lord, as a celibate monk. At once the astrologer’s face cleared, and he smiled. “Ah — then the chart no longer governs him. Once a soul is surrendered to the Lord, the Lord Himself takes charge of his destiny.”"}, {"t": "p", "text": "Understand the difference rightly. The demigods, approached for relief, may grant a small adjustment — a better post, a longed-for child, a turn of fortune — but these are loans, and the wheel turns on. Only the Supreme Lord can lift you out of the wheel altogether. So if it is the stars you fear, do not run from astrologer to astrologer for a gemstone or a quick remedy. Take shelter of Tulasi and her Lord; please Him — and the whole sky bows along with Him. What is a horoscope, before the One who made the stars?"}]}, {"part": "Part Eleven — Fruits for This Life", "pnum": 11, "title": "But Never as a Bargain", "id": "part-eleven-fruits-for-this-life-but-never-as-a-bargain", "words": 249, "blocks": [{"t": "p", "text": "A gentle word here — because it changes everything that follows."}, {"t": "p", "text": "Reading all this, the heart leaps: then let me offer a leaf, and claim my health, my fortune, my relief! But here the path turns subtle. The Lord is not a machine that dispenses a reward when the right coin is dropped in. He is a Person, and what He receives is love. Offer the leaf as a transaction — I give this, so You must give me that — and you have already let go of the one thing that makes it work. Can you feel the difference — between bargaining and loving?"}, {"t": "p", "text": "So want these blessings honestly; there is no shame in it, and the scriptures themselves hold them out to you. But offer the leaf for love, not as payment — then leave the fruits to the One who loves you, to give in His own way and in His own time, and in the form that is truly good for you. That form is not always the one we would have chosen; it is always the one we would have chosen, had we seen as clearly as He sees."}, {"t": "p", "text": "And know this above all: the surest fruit is the one that begins the very moment you offer — the quiet changing of your own heart, and the nearness of God. That blessing never fails, and never waits on circumstances turning out as you hoped. Seek that, and the rest is added in its measure."}]}, {"part": "Part Eleven — Fruits for This Life", "pnum": 11, "title": "And Even the Flawed Are Lifted", "id": "part-eleven-fruits-for-this-life-and-even-the-flawed-are-lifted", "words": 185, "blocks": [{"t": "p", "text": "But read the verse’s last line again, slowly — for it is the most astonishing of all."}, {"t": "p", "text": "Even a liar. Even a cheat. Even one who keeps no rule of holy life."}, {"t": "p", "text": "Do not take this from me — hear it in the words of the scripture itself:"}, {"t": "verse", "lines": ["yaḥ kaścid vaiṣṇavo loke", "mithyācāro 'py anāśramī", "punāti sakalān lokān", "śirasā tulasīṁ vahan"], "cite": "Skanda Purana"}, {"t": "p", "text": "What it means: “Any devotee in this world — even a hypocrite, even one who keeps no rule of holy life — simply by carrying tulasi upon his head, purifies all the worlds.”"}, {"t": "p", "text": "So by simply honouring tulasi, such a person does not merely cleanse himself — he purifies all the worlds around him. Consider what that means. The gift does not wait until you have become good enough. It reaches you as you are, with all your failures still upon you — and begins to make of you a fountain of blessing for others."}, {"t": "p", "text": "If you have ever felt too flawed, too far gone, too unworthy to even begin — that line was written for you. I have needed it myself. Have you?"}]}, {"part": "Part Eleven — Fruits for This Life", "pnum": 11, "title": "Inexhaustible — and Yet the Best Is Still to Come", "id": "part-eleven-fruits-for-this-life-inexhaustible-and-yet-the-best-is-still-to-come", "words": 119, "blocks": [{"t": "p", "text": "And these blessings never run dry. The same Skanda Purana promises:"}, {"t": "scripture", "text": "All the religious duties of a devotee who places a tulasi leaf upon his head award him inexhaustible benefit.", "cite": "Skanda Purana"}, {"t": "p", "text": "Inexhaustible — without bottom, without end. Is there any blessing more generous than one that never runs out? Every good thing such a soul does is multiplied beyond all counting."}, {"t": "p", "text": "And yet — all of this is still only the blessing for this short life: righteousness, prosperity, fulfilled desire. There remains a fourth aim, the highest of all — Moksha, the soul’s release — and with it, the blessings that wait at the very door of death, and beyond it."}, {"t": "p", "text": "That is where we turn next."}, {"t": "bridge", "text": "Turn the page."}]}, {"part": "Part Twelve — Fruits Beyond Death", "pnum": 12, "title": "The Fear Beneath All Fears", "id": "part-twelve-fruits-beyond-death-the-fear-beneath-all-fears", "words": 150, "blocks": [{"t": "p", "text": "We have seen what a single leaf can do for the living. But there is one fear that no wealth, no health, no victory can ever buy off — the fear that waits quietly beneath all the others."}, {"t": "p", "text": "Death. And whatever lies on the far side of it."}, {"t": "p", "text": "The scriptures do not flinch from this. They speak plainly of the hour when the soul leaves the body — and of the Yamadutas, the agents of Yama, lord of death, who come to carry the unprepared soul down the long dark road to suffering. It is the one appointment none of us can cancel, and the one journey no money was ever able to ease."}, {"t": "p", "text": "I have felt that fear in the quiet hours; perhaps you have too. What would it mean to no longer carry it? So hear, now, what the scriptures promise to the one who simply keeps tulasi."}]}, {"part": "Part Twelve — Fruits Beyond Death", "pnum": 12, "title": "Death’s Own Agents Cannot Come Near", "id": "part-twelve-fruits-beyond-death-death-s-own-agents-cannot-come-near", "words": 256, "blocks": [{"t": "p", "text": "This is among the most startling promises in all of scripture:"}, {"t": "scripture", "text": "The Yamadutas never visit the houses where the tulasi plant is regularly worshipped. Indeed, they have no right even to see, or to go near, such a house.", "cite": "Skanda Purana"}, {"t": "p", "text": "Read it slowly. The very messengers of death — who come, in the end, for every soul — cannot approach the home where tulasi is honoured. They hold no authority there. The dark road to Yama’s abode simply does not open for that soul. The scriptures even tell of the moment these words were first spoken: at the deathbed of a man who had served tulasi, the Lord’s own messengers arrived and turned the agents of death away, declaring they had no claim upon such a soul."}, {"t": "p", "text": "But notice the sweetest part of that scene. If death’s own agents are turned away, the soul is not left to travel the last road alone. Those messengers who sent them back are the Vishnudutas — the Lord’s own envoys — and they come not to judge, but to receive: to take that soul up with honour, and carry it lovingly home to Him. The dark road to Yama closes; in its place, a bright road to the Lord opens."}, {"t": "p", "text": "What temples full of frightened prayers could not secure, one small plant, tended with love at your door, quietly accomplishes. The terror at the end of life is disarmed. One small plant, tended with love at your door. Is that too much to ask, for peace at life’s last hour?"}]}, {"part": "Part Twelve — Fruits Beyond Death", "pnum": 12, "title": "Even the Body Is Carried Home", "id": "part-twelve-fruits-beyond-death-even-the-body-is-carried-home", "words": 140, "blocks": [{"t": "p", "text": "Her mercy reaches even to the body we leave behind."}, {"t": "p", "text": "So holy is she that every part of her is sacred — her leaves, her flowers, her roots, even the soil at her feet. And the scriptures say that when the body of one who served the Lord is given to the fire with even a small piece of tulasi wood, that soul is carried to the Lord’s own abode — and even grave sinners are washed clean:"}, {"t": "scripture", "text": "The soul of one whose body is cremated with tulasi wood attains a lasting place in the abode of Vishnu. Even those burdened with the gravest sins are absolved.", "cite": "Vishnu-dharmottara Purana"}, {"t": "p", "text": "So her care does not end at the edge of this life. From the first leaf you offer, to the last fire that takes your body, she is there — carrying you home."}]}, {"part": "Part Twelve — Fruits Beyond Death", "pnum": 12, "title": "The Highest Aim of All: To Go Home", "id": "part-twelve-fruits-beyond-death-the-highest-aim-of-all-to-go-home", "words": 156, "blocks": [{"t": "p", "text": "And beyond even this lies the greatest blessing — the fourth and final aim of life: Moksha, liberation."}, {"t": "p", "text": "Think honestly about your desires. When they are not fulfilled, you feel frustration. And when they are fulfilled — a strange thing — you still feel a quiet emptiness, and reach for more. Neither full hands nor empty hands ever truly satisfy. That restlessness is the soul’s own signal: it was never made for this world at all. It is aching to go home."}, {"t": "p", "text": "Liberation is that homecoming — release from the endless wheel of birth and death. But take care here, for not every “liberation” is the same. Merely to dissolve, to vanish into a formless light, is to lose the very thing the heart most longs for: someone to love. The highest freedom the scriptures hold out is not extinction, but reunion — an eternal life of love with the Supreme Person, in His own home."}]}, {"part": "Part Twelve — Fruits Beyond Death", "pnum": 12, "title": "She Carries the Soul to Vaikuntha", "id": "part-twelve-fruits-beyond-death-she-carries-the-soul-to-vaikuntha", "words": 114, "blocks": [{"t": "p", "text": "And this final homecoming, too, the leaf can give:"}, {"t": "scripture", "text": "Those who grow tulasi plants and worship Lord Hari with offerings of her leaves will joyfully reside in the abode of the four‑armed Supreme Lord.", "cite": "Skanda Purana"}, {"t": "p", "text": "There it is — the whole arc of this book, in a single line. The leaf that began as the humblest offering a poor hand could find ends by carrying the soul home — to Vaikuntha, the deathless world, into the personal company of the Lord, never to return to this place of sorrow."}, {"t": "p", "text": "One leaf. From the troubles of this morning, all the way to eternity. Is there anyone or anything else in the world making you that promise?"}]}, {"part": "Part Twelve — Fruits Beyond Death", "pnum": 12, "title": "“But Surely Not for Someone Like Me…”", "id": "part-twelve-fruits-beyond-death-but-surely-not-for-someone-like-me", "words": 103, "blocks": [{"t": "p", "text": "Perhaps your heart lifts at all this — and then sinks again under the old doubt. “Yes, but surely that is for saints. For the pure, the qualified, the lifelong devotees. Not for someone like me, with my failures and my late beginning.”"}, {"t": "p", "text": "It is the most natural objection in the world. And it is precisely the one the scriptures answer next — with a force that may astonish you."}, {"t": "p", "text": "For there is a question we have not yet asked outright: who, exactly, is allowed to receive all of this?"}, {"t": "p", "text": "The answer is shorter, and far larger, than you expect."}, {"t": "bridge", "text": "Turn the page."}]}, {"part": "Part Thirteen — Who Can Receive This? Everyone", "pnum": 13, "title": "The Question No One Dares Ask Aloud", "id": "part-thirteen-who-can-receive-this-everyone-the-question-no-one-dares-ask-aloud", "words": 141, "blocks": [{"t": "p", "text": "We have seen the blessings — for this life and the next. And the doubt we ended on grows louder: surely there are conditions. Surely all this is for the pure, the high‑born, the qualified, the lifelong devotee. Surely there is a fee at the door that I cannot pay."}, {"t": "p", "text": "So let us ask it outright: who, exactly, is allowed to receive all this?"}, {"t": "p", "text": "The scriptures’ answer is so simple it is almost shocking. Everyone. No exceptions. Including you. The believer and the atheist. The saint and the sinner. The cheat, the liar, the one who has broken every rule, the one beginning far too late in life. No one is turned away. And to prove it, the scriptures hand us not an argument, but a story — about the very last man on earth you would expect to be saved."}]}, {"part": "Part Thirteen — Who Can Receive This? Everyone", "pnum": 13, "title": "The Cruel Hunter", "id": "part-thirteen-who-can-receive-this-everyone-the-cruel-hunter", "words": 234, "blocks": [{"t": "p", "text": "Once there lived a hunter named Mrigari — a name that means enemy of the animals."}, {"t": "p", "text": "And he earned it. He was not merely a hunter; he was a torturer. He would loose an arrow to wound, not to kill — leaving the creature half‑dead — and then stand and delight in its slow agony as the life drained from it. There may be no crueler man in all the old accounts."}, {"t": "p", "text": "One day, by great fortune, the sage Narada passed that way and saw what the hunter did. He did not curse him. He simply told him the truth: “By the law of karma, every pain you give returns to you. One day these very animals will hunt you, and savour your slow death as you have savoured theirs.”"}, {"t": "p", "text": "The hunter went cold with fear. “Then what can I do? How do I escape what is coming for me?”"}, {"t": "p", "text": "And Narada’s answer — to the cruelest man alive — was almost unbelievably gentle: “Stop the killing, now. Go home, and plant a Tulasi before your house. Sit before her, and chant the holy names of the Lord. That is all.”"}, {"t": "p", "text": "The hunter hesitated. “But if I stop hunting — who will feed me?” And the sage made him a quiet promise: “I will see that you are fed — food will reach you three times a day. Only do as I have said.”"}]}, {"part": "Part Thirteen — Who Can Receive This? Everyone", "pnum": 13, "title": "What Became of Him", "id": "part-thirteen-who-can-receive-this-everyone-what-became-of-him", "words": 152, "blocks": [{"t": "p", "text": "So the hunter obeyed — faithfully holding to every word of the saint who had shown him the way. He planted Tulasi. He sat before her and chanted. And slowly — leaf by leaf, name by name — the cruelty drained out of him, and something new grew in its place."}, {"t": "p", "text": "Word spread through the villages that the dreaded Mrigari had changed. People came, amazed, and gladly brought him all he needed; he never wanted for food again. And the man who had once tortured deer for sport grew so tender that he would not harm even an ant beneath his foot. His love for the Lord deepened day upon day, until he reached the very perfection of life."}, {"t": "p", "text": "The cruelest man in the story became a pure devotee — through one plant, and one holy name. If Mrigari could change that completely — what do you think could change in you?"}]}, {"part": "Part Thirteen — Who Can Receive This? Everyone", "pnum": 13, "title": "So Tell Me — Who Is Beyond Hope?", "id": "part-thirteen-who-can-receive-this-everyone-so-tell-me-who-is-beyond-hope", "words": 131, "blocks": [{"t": "p", "text": "Sit with that, honestly."}, {"t": "p", "text": "If Mrigari could be lifted — the torturer, the man with a mountain of blood behind him — then there is no one, anywhere, whom this cannot reach. Not the doubter who cannot yet believe. Not the cheat ashamed of his dealings. Not the one who feels he has wasted half his life. Not you — whatever you are carrying as you read this line."}, {"t": "p", "text": "This is the very promise we began the book with, now proven: no one is left outside. The only entrance fee is a willing heart and a single leaf — and even the willingness, as we have seen, Tulasi herself will supply."}, {"t": "writebox", "label": "What have I been telling myself is too heavy to be lifted? Write it here — and then keep reading."}]}, {"part": "Part Thirteen — Who Can Receive This? Everyone", "pnum": 13, "title": "And If It Is Your Birth You Fear", "id": "part-thirteen-who-can-receive-this-everyone-and-if-it-is-your-birth-you-fear", "words": 281, "blocks": [{"t": "p", "text": "Mrigari answers the one who feels too wicked. But some carry a different fear — not “I have done too much wrong,” but “I was born on the wrong side of the door. My family, my caste, my religion, my country — surely all this was never meant for someone like me.”"}, {"t": "p", "text": "For that fear there is another life, and it settles the matter forever."}, {"t": "p", "text": "There was a saint named Haridasa Thakura. He was born into a Muslim family — by the reckoning of his day, wholly outside the fold, barred from the temples, the very last man anyone would imagine leading others in sacred things. And what did he do? He planted himself before Tulasi and chanted the holy names of the Lord — hundreds of thousands of them, every single day, through every hardship the world could throw at him; and it threw a great many."}, {"t": "p", "text": "He grew so luminous with love that the most learned and the highest-born came and bowed at his feet. The Lord Himself, descended in this very age to teach the Name, embraced him as His own and gave him a title for all time: the Namacharya — the teacher of the holy name itself. The man born outside every door became the master of the very practice this little book places in your hands."}, {"t": "p", "text": "So let it be said as plainly as it can be said: the Name belongs to anyone who will call it. Not to a caste, not to a country, not to one religion or one kind of birth. If the door had a lock, would He have handed the key to an outsider — and made him its keeper?"}]}, {"part": "Part Thirteen — Who Can Receive This? Everyone", "pnum": 13, "title": "“But What About My Responsibilities?”", "id": "part-thirteen-who-can-receive-this-everyone-but-what-about-my-responsibilities", "words": 121, "blocks": [{"t": "p", "text": "You may have caught the hunter’s other worry, because it is your worry too: “If I give myself to this — who will feed me? What of my work, my family, my duties, my ambitions?”"}, {"t": "p", "text": "It is a fair and honest question, and the scriptures do not brush it aside. Notice what happened to Mrigari: the moment he took the first sincere step, his needs were quietly taken care of. Does the Lord leave sincere beginners without support? The story says: He does not. Only begin — right in the middle of your life — with one small leaf."}, {"t": "p", "text": "How, exactly, do you begin? That is all that remains to be told — and it is beautifully simple."}, {"t": "bridge", "text": "Turn the page."}]}, {"part": "Part Fourteen — Where to Begin", "pnum": 14, "title": "It Really Is This Simple", "id": "part-fourteen-where-to-begin-it-really-is-this-simple", "words": 95, "blocks": [{"t": "p", "text": "So we come, at last, to the question every honest reader has been holding: all right — what do I actually do?"}, {"t": "p", "text": "Here is the whole of it. After all the verses and all the glories, the practice itself is so small that a child could keep it, so simple that the busiest person could fold it into an ordinary day, so cheap that the poorest could never be priced out. A few small acts, begun today, exactly where you are. Does that sound too hard?"}, {"t": "p", "text": "Let me lay them before you, one by one."}]}, {"part": "Part Fourteen — Where to Begin", "pnum": 14, "title": "First — Welcome Tulasi into Your Life", "id": "part-fourteen-where-to-begin-first-welcome-tulasi-into-your-life", "words": 87, "blocks": [{"t": "p", "text": "Keep a Tulasi plant. That is the beginning."}, {"t": "p", "text": "A single small pot on a windowsill or balcony is enough; you need no garden and no wealth. If you cannot keep one yet, honour a Tulasi growing nearby. And remember who she is — not a decoration, but a person: the Lord’s own dear devotee, and the giver of devotion. So give her a clean and loving place, and treat her as the honoured guest she truly is. Could you find a warm, clean corner for her today?"}]}, {"part": "Part Fourteen — Where to Begin", "pnum": 14, "title": "Second — Tend Her, and Offer Her Leaves", "id": "part-fourteen-where-to-begin-second-tend-her-and-offer-her-leaves", "words": 97, "blocks": [{"t": "p", "text": "Each day, pour a little water at her roots. Do it with the short prayer we learned earlier — the one that calls her the awakener of devotion — and that simple watering becomes an act of worship."}, {"t": "p", "text": "Then, gently and with respect, take a leaf and offer it to the Lord: placed at His feet, or upon His image, or simply lifted up to Him with love. Even one leaf is enough. (There are a few gentle courtesies in how and when to gather her leaves; we will come to those — for now, simply begin.)"}]}, {"part": "Part Fourteen — Where to Begin", "pnum": 14, "title": "Third — Make Your Food an Offering", "id": "part-fourteen-where-to-begin-third-make-your-food-an-offering", "words": 149, "blocks": [{"t": "p", "text": "Here is a practice that will quietly transform your every day. Before you eat, offer your food to the Lord — with a Tulasi leaf placed upon it."}, {"t": "p", "text": "The Bhagavad‑gita is clear about why this matters:"}, {"t": "verse", "lines": ["yajña-śiṣṭāśinaḥ santo", "mucyante sarva-kilbiṣaiḥ", "bhuñjate te tv aghaṁ pāpā", "ye pacanty ātma-kāraṇāt"], "cite": "Bhagavad‑gita 3.13"}, {"t": "p", "text": "What it means: “The devotees of the Lord are freed from all sins, for they eat food that was first offered in sacrifice. But those who cook only for their own enjoyment — they eat only sin.”"}, {"t": "p", "text": "Why it is here: Ordinary food, the scriptures say, carries a hidden weight of sin. But food first offered to the Lord becomes prasadam — His mercy, sanctified and sinless. Lay a Tulasi leaf upon what you have cooked, offer it to Him with love, and then eat. Your most ordinary daily act — eating — becomes worship that purifies you, meal by meal."}]}, {"part": "Part Fourteen — Where to Begin", "pnum": 14, "title": "Fourth — Chant His Holy Names", "id": "part-fourteen-where-to-begin-fourth-chant-his-holy-names", "words": 86, "blocks": [{"t": "p", "text": "And as you tend her, and as you offer, do the simplest and greatest thing of all: speak the holy names of the Lord."}, {"t": "p", "text": "Sit before Tulasi, as the cruel hunter once did, and chant — softly, aloud, or under your breath. The names of God are not ordinary sounds; they carry Him within them. This is the very heart of the practice — and in our age it is the most powerful method of all, so much so that it deserves the page that follows."}]}, {"part": "Part Fourteen — Where to Begin", "pnum": 14, "title": "Begin Today — As You Are", "id": "part-fourteen-where-to-begin-begin-today-as-you-are", "words": 394, "blocks": [{"t": "p", "text": "That is the whole practice. Welcome her; water her; offer her leaf; offer your food; chant His names. Nothing here asks for money, learning, high birth, or a pure heart you do not yet possess."}, {"t": "p", "text": "And nothing here asks for Sanskrit, either. You will have noticed the verses set through these pages in the old sacred tongue. They are a gift, not a gate — placed here so you may see for yourself that nothing in this book is invented, that every promise rests on scripture. But you need not learn or recite a single one to begin. Speak to the Lord and to Tulasi in your own language, in the plainest words you have — or with no words at all, in the silence of your heart, where He hears most clearly of all. It is the love He receives, never the accent. To learn a verse or two in time, as they begin to draw you, is a sweet thing for later; it is no burden for today."}, {"t": "p", "text": "And take heart from the Lord’s own promise to everyone who merely begins:"}, {"t": "verse", "lines": ["nehābhikrama-nāśo 'sti", "pratyavāyo na vidyate", "sv-alpam apy asya dharmasya", "trāyate mahato bhayāt"], "cite": "Bhagavad‑gita 2.40"}, {"t": "p", "text": "What it means: “In this effort there is no loss and no diminution; even a little advancement on this path protects one from the greatest fear.”"}, {"t": "p", "text": "Why it is here: Hear the mercy in it. On every other road, a journey half-finished leaves you with nothing to show. On this one, not a single sincere step is ever wasted — and even a little of it carries you past the deepest fear there is. So begin small, begin imperfectly, begin unsure — only begin. Whatever you offer today is already kept, and already at work in you."}, {"t": "writebox", "label": "My first step — what I will do today, starting now:"}, {"t": "p", "text": "So do not wait to feel ready. I did not; I began with a single pot on a windowsill and one Name, unsure of everything. Begin with one step — one pot, one leaf, one Name — and let the rest grow, as it grew in Mrigari, as it has grown in every soul who ever began. Tulasi will supply the love; you need only supply the beginning."}, {"t": "p", "text": "And of all these steps, the chanting of the Name is the secret heart. Let us turn to it now."}, {"t": "bridge", "text": "Turn the page."}]}, {"part": "Part Fifteen — The Holy Name", "pnum": 15, "title": "The Secret Heart of the Whole Practice", "id": "part-fifteen-the-holy-name-the-secret-heart-of-the-whole-practice", "words": 338, "blocks": [{"t": "p", "text": "We have saved the most important thing for last."}, {"t": "p", "text": "Of all the small acts of the practice, one carries the greatest power: the chanting of the Lord’s holy names. Tend Tulasi, offer her leaf, offer your food — yes. But as you do, let His Name be on your lips. For here is a truth the scriptures repeat without tiring: the Name of the Lord is not different from the Lord Himself. He has placed Himself fully within His Name. So when you call His Name, He is there — as surely as if He stood before you. To chant is simply to be with Him. Is anything in the world easier than that?"}, {"t": "p", "text": "The Padma Purana states it without hedging:"}, {"t": "verse", "lines": ["nāma cintāmaṇiḥ kṛṣṇaś", "caitanya-rasa-vigrahaḥ", "pūrṇaḥ śuddho nitya-mukto", "'bhinnatvān nāma-nāminoḥ"], "cite": "Padma Purana"}, {"t": "p", "text": "What it means: “Krishna’s holy name is a wish-fulfilling jewel, the very form of spiritual joy — complete, pure, and eternally free; for the name and the named are not different.”"}, {"t": "p", "text": "Why it is here: That last phrase holds the whole secret — the name and the named are not different. To carry His Name on your tongue is to carry Him."}, {"t": "p", "text": "And lest we imagine this is only the fond praise of devotees, the Lord ranks the Name with His own mouth. In the Bhagavad‑gita, naming the highest in every order of things, He says:"}, {"t": "verse", "lines": ["maharṣīṇāṁ bhṛgur ahaṁ", "girām asmy ekam akṣaram", "yajñānāṁ japa-yajño 'smi", "sthāvarāṇāṁ himālayaḥ"], "cite": "Bhagavad‑gita 10.25"}, {"t": "p", "text": "What it means: “Of the great sages I am Bhrigu; of words, the single syllable Om. Of all sacrifices I am japa — the soft chanting of the holy names; and of all that stands unmoving, the Himalayas.”"}, {"t": "p", "text": "Why it is here: Of every sacrifice a soul could offer — every fire, every fast, every costly gift — the Lord says that He Himself is the chanting of His names. No higher offering is named anywhere. The faintest whisper of His Name is the greatest of all sacrifices. And it costs you nothing but the breath you are already breathing."}]}, {"part": "Part Fifteen — The Holy Name", "pnum": 15, "title": "The Medicine Made for Our Age", "id": "part-fifteen-the-holy-name-the-medicine-made-for-our-age", "words": 204, "blocks": [{"t": "p", "text": "And there is a special reason this matters so much now."}, {"t": "p", "text": "The sages teach that time turns through great ages, and that we live in the last and hardest of them — Kali Yuga, the age of quarrel and confusion. Our lives are short, our minds scattered, our bodies weak, our faith thin. The mighty practices of older ages — vast sacrifices, lifelong austerities, deep unbroken meditation — are simply beyond most of us now."}, {"t": "p", "text": "The Lord knew this. And in His mercy, for this very age, He left one method simple enough for every fallen soul to manage. The scriptures could not be more emphatic:"}, {"t": "verse", "lines": ["harer nāma harer nāma", "harer nāmaiva kevalam", "kalau nāsty eva nāsty eva", "nāsty eva gatir anyathā"], "cite": "Brihan‑naradiya Purana"}, {"t": "p", "text": "What it means: “The holy name, the holy name, the holy name of the Lord — that alone. In this age of Kali there is no other way, no other way, no other way.”"}, {"t": "p", "text": "Why it is here: Hear how it repeats itself, three times over, as though taking us by the shoulders. For our age, the holy name is not one good method among many — it is the way, held out to everyone after all the harder paths have closed."}]}, {"part": "Part Fifteen — The Holy Name", "pnum": 15, "title": "He Came to Teach It Himself", "id": "part-fifteen-the-holy-name-he-came-to-teach-it-himself", "words": 313, "blocks": [{"t": "p", "text": "And the Lord’s kindness went further still."}, {"t": "p", "text": "So that no one could ever say “but I do not know how to love, or how to chant,” the Lord descended into this very age as His own devotee — to show us, by His own living example, how to call upon the Name with a melting heart. He came not to be served, but to teach; not as a master, but as the humblest of devotees. The saints tell us this was the sweetest of all His descents: God Himself, come down to chant God’s names — only to lead us by the hand."}, {"t": "p", "text": "The Srimad Bhagavatam foretold His coming:"}, {"t": "verse", "lines": ["kṛṣṇa-varṇaṁ tviṣākṛṣṇaṁ", "sāṅgopāṅgāstra-pārṣadam", "yajñaiḥ saṅkīrtana-prāyair", "yajanti hi su-medhasaḥ"], "cite": "Srimad Bhagavatam 11.5.32"}, {"t": "p", "text": "What it means: “In this age the wise worship, through the congregational chanting of His names, the descent of God who ceaselessly sings ‘Krishna’ — one whose own complexion is golden, not dark, yet who is Krishna Himself, come with His companions.”"}, {"t": "p", "text": "He walked through the streets barefoot, leading great processions in the chanting of the Holy Name — men and women, old and young, the learned and the utterly simple, even those the world had set aside. He wept over the Lord’s names openly, without shame, as though the sound of them was more than a human heart could hold. He laughed and danced with ordinary people in the market square. And in doing so, He gave to every soul of this age what no scripture alone could have provided: not a doctrine to be reasoned through, but a living, unmistakable example of what it looks like to call upon the Lord with a wholly surrendered heart."}, {"t": "p", "text": "So if you have ever felt unsure of how to call the Name — that is exactly why He came. Did anyone ever give such a complete answer to such a simple question — with so much love?"}]}, {"part": "Part Fifteen — The Holy Name", "pnum": 15, "title": "The Name to Chant", "id": "part-fifteen-the-holy-name-the-name-to-chant", "words": 151, "blocks": [{"t": "p", "text": "What, then, do we chant? The great chant of this age — the maha‑mantra, the “great chant for deliverance” — is woven of His own dear names:"}, {"t": "verse", "lines": ["Hare Kṛṣṇa Hare Kṛṣṇa", "Kṛṣṇa Kṛṣṇa Hare Hare", "Hare Rāma Hare Rāma", "Rāma Rāma Hare Hare"], "cite": "The Maha-mantra"}, {"t": "p", "text": "What it means: It is a prayer made of the Lord’s names — a call to Krishna, to Rama, and to His divine loving energy: O all‑attractive Lord, O reservoir of all joy, O divine energy of the Lord — please, engage me in Your loving service."}, {"t": "p", "text": "Why it is here: These are the very syllables the cruel hunter chanted, the syllables saints have wept over for ages. No initiation is needed to begin, no fee, no qualification. Chant them aloud, or softly, or in a whisper — on a walk, at your work, or before Tulasi in the quiet of the morning. The door is always open."}]}, {"part": "Part Fifteen — The Holy Name", "pnum": 15, "title": "Tulasi and the Name, Together", "id": "part-fifteen-the-holy-name-tulasi-and-the-name-together", "words": 109, "blocks": [{"t": "p", "text": "Now recall what the sage Narada told Mrigari — for it was never one instruction, but two, joined: plant Tulasi, and chant the Lord’s name."}, {"t": "p", "text": "There it is — the whole of this book in a single breath. The leaf and the Name. Her service, and His sound. Offer the one and chant the other, and you hold in your two hands the simplest, surest path the scriptures know — the very path that lifted a murderer to perfection."}, {"t": "p", "text": "A leaf in your fingers, a Name on your tongue. That is all. And it is everything. Isn’t that the simplest and most complete instruction you have ever been given?"}]}, {"part": "Part Fifteen — The Holy Name", "pnum": 15, "title": "A Few Gentle Courtesies Remain", "id": "part-fifteen-the-holy-name-a-few-gentle-courtesies-remain", "words": 55, "blocks": [{"t": "p", "text": "A few small, practical questions are still worth answering — how to care for Tulasi, and how and when to gather her leaves with love and respect. Little courtesies, but they matter."}, {"t": "p", "text": "Let us settle those next — and then come to the end, and to what your one leaf finally means."}, {"t": "bridge", "text": "Turn the page."}]}, {"part": "Part Sixteen — Honouring Her Rightly", "pnum": 16, "title": "Not Rules, but Love", "id": "part-sixteen-honouring-her-rightly-not-rules-but-love", "words": 179, "blocks": [{"t": "p", "text": "Before we reach the end, a few gentle, practical questions deserve an answer: how do we care for Tulasi, and how do we gather her leaves?"}, {"t": "p", "text": "But hear the spirit of this first, or all that follows will be misunderstood. What comes now are not bureaucratic rules meant to trip you up. They are simply the courtesies of love — the natural care you would show any beloved, honoured guest in your home. How do you treat someone you truly love? Just like that."}, {"t": "p", "text": "For Tulasi is a person. The scriptures are emphatic:"}, {"t": "scripture", "text": "An intelligent person should never disrespect tulasi by thinking her an ordinary plant. As the salagrama stone is the direct presence of Lord Vasudeva, so tulasi is the direct presence of Goddess Lakshmi herself. By touching her, beholding her, and tending her, even the reactions to grave sins are destroyed.", "cite": "Skanda Purana"}, {"t": "p", "text": "So we do not “harvest” her as we would pluck a vegetable. We approach her as we would a gracious mother — with a little care, a little tenderness. That is all these courtesies really are."}]}, {"part": "Part Sixteen — Honouring Her Rightly", "pnum": 16, "title": "Gathering Her Leaves", "id": "part-sixteen-honouring-her-rightly-gathering-her-leaves", "words": 217, "blocks": [{"t": "p", "text": "When you take a leaf to offer, do it gently:"}, {"t": "li", "text": "Ask her first. A soft word, a moment’s prayer — “Mother Tulasi, may I take a leaf for the Lord?” You are asking a person, not stripping a bush."}, {"t": "li", "text": "Use your fingertips, never your nails; take the leaf softly, without tearing or harming the plant."}, {"t": "li", "text": "Take only what you need — even a single clean, whole leaf is a complete offering."}, {"t": "p", "text": "And as you gather, the tradition gives two short prayers for this very moment — one as you pick, one to beg her pardon after:"}, {"t": "verse", "lines": ["tulasy amṛta-janmāsi", "sadā tvaṁ keśava-priyā", "keśavārthe vicinvāmi", "varadā bhava śobhane"], "cite": "Mantra for picking Tulasi leaves"}, {"t": "p", "text": "What it means: “O Tulasi, born of nectar, ever dear to Lord Kesava — I gather your leaves for His worship alone. O lovely one, grant me your blessing that it may succeed.”"}, {"t": "verse", "lines": ["cayanod-bhava-duḥkhaṁ ca", "yad hṛdi tava vartate", "tat kṣamasva jagan-mātā", "vṛnde devi namo'stu te"], "cite": "Mantra to beg pardon after picking"}, {"t": "p", "text": "What it means: “O mother of the universe, forgive whatever pain my gathering may have caused you; O Vrinda Devi, I bow to you.” Say them however haltingly — it is the heart behind them that she receives."}, {"t": "p", "text": "A small care, but it changes everything: the picking itself becomes an act of love. Can you feel the difference — between plucking and offering with care?"}]}, {"part": "Part Sixteen — Honouring Her Rightly", "pnum": 16, "title": "When to Let Her Rest", "id": "part-sixteen-honouring-her-rightly-when-to-let-her-rest", "words": 149, "blocks": [{"t": "p", "text": "Many devotees also observe gentle times for this. By long tradition, one does not disturb Tulasi by picking her leaves at night, nor on certain sacred days — such as Dvadashi, the day after Ekadashi. On such days there is no difficulty at all: simply offer a leaf you have already gathered, or one that has fallen of itself — these serve just as fully. A simple habit makes this effortless: on Ekadashi, gather enough to last the following day too."}, {"t": "p", "text": "And remember the mercy we met earlier: if ever you have no fresh leaf, an already‑offered leaf, a small piece of her wood, or even her name upon your lips is accepted. No day, and no circumstance, is ever truly closed to you."}, {"t": "p", "text": "(These finer customs vary a little from place to place and tradition to tradition; hold them lightly, and follow the practice of those you trust.)"}]}, {"part": "Part Sixteen — Honouring Her Rightly", "pnum": 16, "title": "Offering Her Rightly", "id": "part-sixteen-honouring-her-rightly-offering-her-rightly", "words": 93, "blocks": [{"t": "p", "text": "And when you offer her leaf to the Lord, offer it with attention and love — as a gift you genuinely wish the beloved to enjoy. If you like, offer it with the simple words the tradition gives:"}, {"t": "verse", "lines": ["etat tulasī-patraṁ klīṁ kṛṣṇāya namaḥ"], "cite": "Mantra for offering a Tulasi leaf"}, {"t": "p", "text": "What it means: “O Krishna, I offer You this Tulasi leaf, most dear to You — kindly accept it.”"}, {"t": "p", "text": "And treat the offered leaves with respect afterward; never trodden underfoot, never carelessly thrown away. She is His, always — so let everything you do with her be turned toward Him."}]}, {"part": "Part Sixteen — Honouring Her Rightly", "pnum": 16, "title": "One Thing That Is Not a Gentle Courtesy", "id": "part-sixteen-honouring-her-rightly-one-thing-that-is-not-a-gentle-courtesy", "words": 216, "blocks": [{"t": "p", "text": "Everything we have spoken of so far has been gentle — small kindnesses of love, where no sincere heart need fear a misstep. But there is one matter now that is not a gentle courtesy at all. It is grave; it is serious; and in truth it is among the deepest reasons this book was written. Read what follows slowly."}, {"t": "p", "text": "We have seen how dear Tulasi is to the Lord. What we have not yet said is how strict the scriptures are that she be offered to Him — and to Him alone. So strict that the Brhan-naradiya Purana declares that without her, the worship of the Lord is not even worship:"}, {"t": "scripture", "text": "Worship of the Lord without Tulasi does not count as worship; bathing the Lord without Tulasi does not count as bathing; offering food to the Lord without Tulasi does not count as His eating; and offering drink to the Lord without Tulasi does not count as His drinking.", "cite": "Brhan-naradiya Purana"}, {"t": "p", "text": "The Lord insists on Tulasi in every offering — not to bind us, but to bless us. And yet, out of this very dearness, a grave error has spread in innocent ignorance through our temples and homes alike: the offering of Tulasi to gods other than the Supreme Lord. This we must understand — and stop."}]}, {"part": "Part Sixteen — Honouring Her Rightly", "pnum": 16, "title": "She Is the Lord’s Alone — Never the Demigods’", "id": "part-sixteen-honouring-her-rightly-she-is-the-lord-s-alone-never-the-demigods", "words": 326, "blocks": [{"t": "p", "text": "Hear the warning of the scriptures, for it is not gentle. The Vayu Purana speaks of it sternly:"}, {"t": "scripture", "text": "Lord Hari never accepts worship without Tulasi. But a person who worships the demigods with Tulasi leaves incurs the sins of killing a cow, of killing a brahmana, and of violating the wife of his own spiritual master.", "cite": "Vayu Purana"}, {"t": "p", "text": "This is no light statement. It sets the misuse of Tulasi — offering her to anyone but the Supreme Lord — beside the very gravest sins a soul can commit. Why so severe? Because Tulasi is no ordinary flower to be passed around. She is the Lord’s own internal energy, His eternal consort. To take the beloved consort of the Supreme Lord and offer her to a demigod — who is himself the Lord’s servant — is an act of profound impropriety. It displeases the Lord, and it displeases the very demigod so worshipped."}, {"t": "p", "text": "So let it be crystal clear. Tulasi is exclusive to the Vishnu‑tattva — to the Supreme Lord in His own forms: Lord Krishna, Lord Rama, Lord Narasimha, Lord Vishnu, Lord Narayana, Lord Vamana, and His other direct expansions. She is not to be offered to the demigods — not to Lord Shiva, not to Ganesha, not to Durga, not to Kartikeya — however great and worshipable they are in their own stations."}, {"t": "p", "text": "So careful is this that even when Tulasi is wanted for medicine, or to be placed upon a departing body for the soul’s sake, she must first be offered to the Lord. The Hari-bhakti-vilasa is firm:"}, {"t": "scripture", "text": "One should never take Tulasi leaves for any purpose without first offering them to Lord Krishna.", "cite": "Sri Hari-bhakti-vilasa"}, {"t": "p", "text": "To a devotee she is never a mere herb to be plucked and used. She is a person, and a person dear to God. Offered first to Him, she becomes His mercy — prasadam — and only then may she serve any other purpose. Taken without offering, her use becomes an offense."}]}, {"part": "Part Sixteen — Honouring Her Rightly", "pnum": 16, "title": "Even the Great Devotees Will Not Take Her", "id": "part-sixteen-honouring-her-rightly-even-the-great-devotees-will-not-take-her", "words": 275, "blocks": [{"t": "p", "text": "“But surely the great devotees are an exception?” one may ask. “Hanuman is the greatest servant of Lord Rama — may we not offer Tulasi to him?”"}, {"t": "p", "text": "Here is the beautiful answer: the great devotees are the first to refuse her. Hanuman accepts no worship for himself; he accepts it only for the sake of his Master. Offer fresh Tulasi straight to Hanuman and he is not pleased — he is pained, embarrassed that you would hand him his own Lord’s beloved. But offer that Tulasi to Lord Rama first, and then bring it to Hanuman as the Lord’s remnant, His prasadam — and Hanuman is overjoyed, for now you honour him exactly as he longs to be honoured: as the servant of Rama."}, {"t": "p", "text": "So the loving protocol is simple. At home, give Hanuman Ji the Tulasi already offered to Rama or Vishnu — placed in his hand, or upon his head, never at his feet. And in the great public temples, where in the press of crowds a leaf may so easily slip to the floor and be trodden, the established practice is to avoid offering Tulasi to Hanuman at all, rather than risk that dishonour."}, {"t": "p", "text": "The same holds for Lord Shiva and the Mother, Devi. They are the greatest of Vaishnavas — vaiṣṇavānāṁ yathā śambhuḥ, “among all Vaishnavas, Shiva is the foremost.” They do not want Tulasi for themselves; they want to see their Lord worshipped with her. Worship the Supreme Lord rightly with Tulasi, and Shiva, Shakti, Ganesha, Kartikeya — every demigod — is satisfied of itself, for each beholds his own Master pleased, and each blesses the soul who pleased Him."}]}, {"part": "Part Sixteen — Honouring Her Rightly", "pnum": 16, "title": "What Is Happening in Our Temples Today", "id": "part-sixteen-honouring-her-rightly-what-is-happening-in-our-temples-today", "words": 385, "blocks": [{"t": "p", "text": "Walk into many a temple today, and you will see it with your own eyes: Tulasi handed about indiscriminately — laid before Ganesha, pressed upon the Navagrahas, the nine planets, offered to whichever deity stands near. It is done, almost always, in good faith and innocent ignorance — most often where temples are run by well-meaning but untrained hands. The great, established temples, guided by learned Pandits, know these rules and strictly forbid such deviations."}, {"t": "p", "text": "So what should you do when you see the wrong practice? Never with arrogance; never with anger."}, {"t": "li", "text": "Honour their sincerity. The priest or devotee almost surely acts out of love and a wish to serve."}, {"t": "li", "text": "Educate humbly, if you can — a soft word: “I read in the Puranas that Tulasi is so dear to Lord Vishnu that she is meant for Him alone.”"}, {"t": "li", "text": "Let a book do the speaking where a stranger’s word is hard to receive. For exactly this purpose a small companion book was written — Stop Wrong Practices & Save Devotees — kept pocket‑sized and as inexpensive as possible, and available on Amazon, so that anyone can carry it, gift it, or quietly leave it where it is needed. Let it say gently what you cannot."}, {"t": "li", "text": "And if you can do none of these, pray — to Lord Hari, to Tulasi Devi, to Hanuman: “Please guide these devotees to serve you rightly.”"}, {"t": "p", "text": "Do not offend the devotee — but do not lend your support to the wrong practice either. Your one humble word, or your silent prayer, may save a sincere soul from a serious offense — an aparadha — without their ever knowing it was you. That quiet rescue is among the dearest services this little book hopes you will carry out."}, {"t": "p", "text": "And here let me say something plainly, as the one who wrote it. This book was never meant to be owned. Anyone who wishes to help stop these offences may freely copy it, print it, and pass it on — in whole or in part, and without charge — in good faith, so long as nothing in it is altered and its meaning is not twisted. Buy it and gift it, or copy it and share it — whichever lets it reach one more soul. Let the little book do its quiet work."}]}, {"part": "Part Sixteen — Honouring Her Rightly", "pnum": 16, "title": "Why He Is So Strict: They Cannot Be Parted", "id": "part-sixteen-honouring-her-rightly-why-he-is-so-strict-they-cannot-be-parted", "words": 203, "blocks": [{"t": "p", "text": "Beneath all of this lies one tender truth that explains the Lord’s strictness entirely. Tulasi is His own. The Lord and His energy — Shaktiman and Shakti — are not two things that can be parted. They are one."}, {"t": "p", "text": "As Shiva and Parvati cannot be parted; as Rama and Sita cannot be parted — so Lord Hari and Tulasi cannot be parted. To take her and give her to another is to try to break that divine union; it is, in the language of the heart, an act of unfaithfulness to the Lord Himself."}, {"t": "p", "text": "Consider it simply. In this world we honour a king’s wife as the queen — and we would never dream of handing the queen’s own service to a minister, however high he stands. Just so, Tulasi’s service belongs to the King of all kings, the Supreme Person, and to no one else. Can you feel why the Lord guards this so closely? When we keep that union whole — offering her only to Him — we are not merely avoiding an error; we are aligning ourselves with the deepest harmony of all things, and into that harmony our own homes, our peace, and our every relationship are quietly blessed."}]}, {"part": "Part Sixteen — Honouring Her Rightly", "pnum": 16, "title": "The Spirit of It All", "id": "part-sixteen-honouring-her-rightly-the-spirit-of-it-all", "words": 138, "blocks": [{"t": "p", "text": "Now — do not let any of this frighten you into thinking you might “do it wrong” and spoil everything. You will not."}, {"t": "p", "text": "The Lord and His Tulasi look only at the heart. Do your simple best, with whatever love and care you have, and she — the most forgiving of mothers — will more than make up for the rest. A child who brings his mother a slightly crumpled flower has not failed; he has delighted her."}, {"t": "p", "text": "Begin imperfectly. Begin anyway. Isn’t that what a loving mother would say?"}, {"t": "p", "text": "Only this one thing, hold firm: she is the Lord’s, and the Lord’s alone. The small courtesies you may keep imperfectly; that truth, never let go."}, {"t": "p", "text": "And now we come to the end — and to what this one small leaf has meant all along."}, {"t": "bridge", "text": "Turn the page."}]}, {"part": "Part Seventeen — Coming Back to the One Leaf", "pnum": 17, "title": "Coming Back to the One Leaf", "id": "part-seventeen-coming-back-to-the-one-leaf-coming-back-to-the-one-leaf", "words": 140, "blocks": [{"t": "p", "text": "We have come a long way together."}, {"t": "p", "text": "We began by asking what we want — and found a hundred longings. We asked what the Lord wants — and found that He asks for almost nothing: a leaf, offered with love. We learned which leaf He loves best, and met Tulasi. We found the secret that she gives the very devotion we lack; we learned who she is, and that the Lord is a Person who truly receives us. We counted the blessings — for this life, for the hour of death, and for eternity. We saw that no one, however fallen, is shut out. And we learned the practice — small enough for anyone to begin tonight."}, {"t": "p", "text": "And now, at the end, it all comes home to where it started. To one leaf. Was the whole journey here? It was."}]}, {"part": "Part Seventeen — Coming Back to the One Leaf", "pnum": 17, "title": "The Lord, Bought by a Leaf", "id": "part-seventeen-coming-back-to-the-one-leaf-the-lord-bought-by-a-leaf", "words": 215, "blocks": [{"t": "p", "text": "Here is the wonder to carry away with you."}, {"t": "p", "text": "The Supreme Lord owns everything that exists. No treasure can buy Him; no power can command Him; the wealth of a thousand worlds cannot move Him an inch. And yet — He lets Himself be purchased, utterly, by one single thing: love. Even love as small as a leaf laid in His hand."}, {"t": "p", "text": "He does not weigh the gift. He weighs the heart behind it. Offer Him a mountain of gold without love, and He turns away. Offer Him one tulasi leaf with love, and you have bought the Lord of all the universes. He becomes, willingly, the treasure of those who love Him."}, {"t": "p", "text": "The scriptures show Him doing exactly this:"}, {"t": "scripture", "text": "Lord Vishnu sets aside flowers fashioned of gold, of coral, and of precious jewels — to accept instead the leaves of tulasi, offered with love.", "cite": "Skanda Purana"}, {"t": "p", "text": "Think of what that means. He who needs nothing, who lacks nothing, who is complete and full in Himself — is satisfied by your one small leaf. Not merely tolerant of it. Not grudgingly accepting. Delighted — the way a father is delighted by his child’s clumsy gift, far beyond anything the gift is worth."}, {"t": "p", "text": "Your little offering genuinely gladdens the heart of God. Let that be impossible to forget."}]}, {"part": "Part Seventeen — Coming Back to the One Leaf", "pnum": 17, "title": "And Then — He Follows You", "id": "part-seventeen-coming-back-to-the-one-leaf-and-then-he-follows-you", "words": 163, "blocks": [{"t": "p", "text": "And here is the sweetest turn of all — the one that overturns everything."}, {"t": "p", "text": "All our lives we chase. We chase success, we chase peace; some of us spend years chasing after God Himself, certain He is far away and hard to reach. But the scriptures tell the secret the other way around: the moment you take one sincere step toward Him — one leaf, one Name — He turns, and comes toward you. The Lord you thought you were chasing begins to follow you. He runs after the soul who loves Him — more eager for you than you ever were for Him. The Bhagavatam dares to say it outright: the Lord makes Himself the debtor of His devotees, won and held by their love alone. Did you ever imagine it was the other way around?"}, {"t": "p", "text": "You do not have to climb to heaven. You have only to offer a leaf at your own doorstep — and heaven comes looking for you."}]}, {"part": "Part Seventeen — Coming Back to the One Leaf", "pnum": 17, "title": "So — One Leaf", "id": "part-seventeen-coming-back-to-the-one-leaf-so-one-leaf", "words": 216, "blocks": [{"t": "p", "text": "That is the whole of it. Everything promised in these pages, and more, waits inside one small act that costs you nothing."}, {"t": "p", "text": "For behind that one small act stands the Lord’s own promise — the last and greatest He gives in all the Gita:"}, {"t": "verse", "lines": ["sarva-dharmān parityajya", "mām ekaṁ śaraṇaṁ vraja", "ahaṁ tvāṁ sarva-pāpebhyo", "mokṣayiṣyāmi mā śucaḥ"], "cite": "Bhagavad‑gita 18.66"}, {"t": "p", "text": "What it means: “Abandon all other duties and simply come to Me. I shall free you from every sin. Do not fear.” The single leaf, offered in love, is how that great surrender begins — small enough for trembling hands, yet the very turning He has promised to honour."}, {"t": "p", "text": "You do not need to be rich. You do not need to be learned, or high‑born, or already pure. You do not even need to be certain you believe. You need only a leaf, and a Name, and the willingness to begin — and even the willingness, Tulasi herself will supply. So what remains? Only to begin."}, {"t": "p", "text": "So begin. Pick up the leaf. Say the Name. And watch a single leaf change your life — and then, as it changes you, become someone through whom it can change the lives of others too."}, {"t": "p", "text": "One leaf can change your life."}, {"t": "p", "text": "Now you know it is true. The rest is yours to begin."}]}, {"part": "Part Seventeen — Coming Back to the One Leaf", "pnum": 17, "title": "A Blessing as You Go", "id": "part-seventeen-coming-back-to-the-one-leaf-a-blessing-as-you-go", "words": 78, "blocks": [{"t": "p", "text": "May you find a Tulasi to call your own. May her leaf be ever in your fingers, and His Name ever on your tongue. May the fear of death leave you, and want leave you, and emptiness leave you. And may you come, at the last, joyfully home."}, {"t": "p", "text": "One thing only remains — a quiet word about the one who wrote this book for you, and why he chose to keep his own name hidden."}, {"t": "bridge", "text": "Turn the page."}]}, {"part": "Part Eighteen — A Word from the Author", "pnum": 18, "title": "Why I Wrote This Book", "id": "part-eighteen-a-word-from-the-author-why-i-wrote-this-book", "words": 174, "blocks": [{"t": "p", "text": "A last, quiet word — from me to you."}, {"t": "p", "text": "I am no saint, and no scholar. I am only a fellow traveller who stumbled, late and by great mercy, onto something precious — and could not keep it to himself."}, {"t": "p", "text": "I grew up believing what so many of us are taught: that wealth is everything, that success means money, that respect must be bought. I chased that belief for years, through every high and every low — and somewhere in the chasing, I began to ask deeper questions, moving slowly from a doubting heart toward a believing one. For two decades I wandered through many paths and many teachers, the genuine and the false alike, learning — often the hard way — what to keep and what to leave behind."}, {"t": "p", "text": "This little book is the gift I wish someone had pressed into my hands at the very beginning. I wrote it to spare you the long road I walked: to hand you, on the first page, what took me half a life to find."}]}, {"part": "Part Eighteen — A Word from the Author", "pnum": 18, "title": "An Admission", "id": "part-eighteen-a-word-from-the-author-an-admission", "words": 126, "blocks": [{"t": "p", "text": "Let me be honest with you, as a friend should be."}, {"t": "p", "text": "I have not written this as a perfected master looking down from some height. I write as a beginner, still on the road myself — one who has failed more times than he can count, and who is, even now, only learning to hold a leaf with love. If there is anything true or good in these pages, it is not mine. It came to me from my teachers, and from the mercy of Tulasi and the Lord. I am only the hand that passes it along."}, {"t": "p", "text": "So please do not take me for a guru. Take me for a friend who found water in the desert — and ran back to tell you where."}]}, {"part": "Part Eighteen — A Word from the Author", "pnum": 18, "title": "A Quiet Regret", "id": "part-eighteen-a-word-from-the-author-a-quiet-regret", "words": 116, "blocks": [{"t": "p", "text": "If I have one regret, it is simply this: how long I took to begin."}, {"t": "p", "text": "I spent years I can never recover demanding proofs, arguing, turning away whenever an answer failed to satisfy me — and the whole time, the simplest thing in the world was waiting at arm’s reach. A leaf. A Name. So small that I walked past it again and again."}, {"t": "p", "text": "Do not do as I did. Do not wait for a certainty that may never come, while this rare and precious human life slips quietly through your fingers. If this book spares you even a few of the years I wasted, then every page of it will have been worth the writing."}]}, {"part": "Part Eighteen — A Word from the Author", "pnum": 18, "title": "Why My Name Is Hidden", "id": "part-eighteen-a-word-from-the-author-why-my-name-is-hidden", "words": 142, "blocks": [{"t": "p", "text": "And now, the small promise I made at the beginning — the reason you will not find my true name anywhere on this book."}, {"t": "p", "text": "I have hidden it on purpose. Not out of shame — but because this gift was never mine to sign. The glory belongs to Tulasi, to the Lord, and to the teachers who first placed this treasure in my open hands. A servant does not carve his own name onto his master’s gift."}, {"t": "p", "text": "And there is a quiet mercy in it, too. A message received for its own truth — and not for the fame or the face attached to it — travels farther, and cleaner, and reaches hearts that a name might only have turned away. So I have stepped out of the way on purpose. Weigh the leaf, not the hand that offered it to you."}]}, {"part": "Part Eighteen — A Word from the Author", "pnum": 18, "title": "The Leaf That Outweighed the World", "id": "part-eighteen-a-word-from-the-author-the-leaf-that-outweighed-the-world", "words": 497, "blocks": [{"t": "p", "text": "And weighing — let me leave you with the one story that gave this book its name. The Puranas tell it of Krishna’s own city, Dwaraka."}, {"t": "p", "text": "His queen Satyabhama, proud and certain of her love, longed to prove it. So she undertook a daring rite: the Lord would sit upon one pan of a great balance, and she would heap the other with treasure until it matched His weight — and then give all of it away. Sure of her riches, she began. She poured out her gold. She poured out her jewels. She stripped her palace of its ornaments and piled them high upon the scale."}, {"t": "p", "text": "The balance did not stir. Krishna sat smiling on His pan; not all the wealth of a kingdom could lift Him so much as a finger’s breadth. Her pride drained slowly into dismay."}, {"t": "p", "text": "Then Rukmini, who understood the secret of love, came quietly to the scale. She took a single leaf of Tulasi, breathed the Lord’s name over it with love, and laid it upon that mountain of gold. And in that instant — the scale tipped. One small leaf outweighed the Lord of all the worlds, and all the gold of Dwaraka beside Him."}, {"t": "p", "text": "Do you see it? It was never the gold He weighed. It was the love. The whole treasury of a kingdom could not move Him; one leaf, wet with a moment’s love, lifted Him entirely. Even Ananta Sesha, who bears the worlds upon his hoods and praises the Lord with a thousand tongues, cannot come to the end of Tulasi’s glories; even Narada could not measure them. And yet the Lord whom no treasure can weigh, and no sage can fully praise, is tipped — every single time — by one leaf offered in love."}, {"t": "p", "text": "The scriptures seal the whole secret in a single line. In the Gautamiya‑tantra, quoted in the Hari-bhakti-vilasa, the Lord declares:"}, {"t": "verse", "lines": ["tulasī-dala-mātreṇa", "jalasya culukena vā", "vikrīṇīte svam ātmānaṁ", "bhaktebhyo bhakta-vatsalaḥ"], "cite": "Gautamiya-tantra, quoted in Sri Hari-bhakti-vilasa"}, {"t": "p", "text": "What it means: “Krishna, who loves His devotees beyond all reason, sells His very Self to anyone who offers Him merely a leaf of Tulasi and a palmful of water.”"}, {"t": "p", "text": "Why it is here: Read it slowly. The Lord of endless riches, whom no treasure in creation could ever outweigh, hands over His own Self — for one leaf and a sip of water, given with love. Unable to find anything in all His worlds equal to that small offering, He pays with the only thing that matches it: Himself. That is the whole of this book, sealed in one verse."}, {"t": "p", "text": "That is why this little book carries the name it does. Perhaps you feel you have nothing worth laying on the scale — no gold, no learning, no spotless past. Look again. You have a leaf. You have love. Lay them down together, and you have outweighed the universe. One leaf can change your life — because one leaf, given with love, once outweighed the Lord of all that is."}]}, {"part": "Part Eighteen — A Word from the Author", "pnum": 18, "title": "To You, the Reader", "id": "part-eighteen-a-word-from-the-author-to-you-the-reader", "words": 159, "blocks": [{"t": "p", "text": "You who have come all this way with me — though we may never meet in this life, you are dear to me, and I have prayed for you while writing every page."}, {"t": "p", "text": "Now the book is finished, and only one thing remains — and it is yours. Pick up the leaf. Speak the Name. Begin. And if any of this has helped you, do the one thing that would make me happiest: quietly pass it on to one other soul who needs it. That is all the thanks I could ever wish for."}, {"t": "p", "text": "May Tulasi take you by the hand. And may you come, at the last, joyfully home."}, {"t": "p", "text": "Dedicated, with all my heart, to my teachers — who showed me who I am, whose world this is, and to whom it all belongs."}, {"t": "p", "text": "— Dina Bandhu Bhakta Charan Sevak “the Lord is the friend of the fallen; I, but a servant at the feet of His devotees”"}]}, {"part": "Part Eighteen — A Word from the Author", "pnum": 18, "title": "Also by the Author", "id": "part-eighteen-a-word-from-the-author-also-by-the-author", "words": 121, "blocks": [{"t": "p", "text": "If this little leaf has served you, two companion books may carry you further. Both are written in the same spirit, and both can be found on Amazon under the author’s name:"}, {"t": "p", "text": "Stop Wrong Practices & Save Devotees A short, pocket‑sized book written for a single purpose: to gently stop the offences against Tulasi and the Lord that these pages describe. Kept as inexpensive as could be — so that anyone may read it, and anyone may gift it, to spare a sincere soul an unknowing offence."}, {"t": "p", "text": "The Tulasi Secret: Unlocking Success at Every Home A fuller treasury of Tulasi’s glories, and of the blessings her presence brings into a home."}, {"t": "p", "text": "May these humble offerings serve you — and serve her."}]}, {"part": "Part Eighteen — A Word from the Author", "pnum": 18, "title": "Listen to the Whole Book Online", "id": "part-eighteen-a-word-from-the-author-listen-to-the-whole-book-online", "words": 114, "blocks": [{"t": "p", "text": "This little book has a living companion online — for those who would rather listen than read, or do both together."}, {"t": "p", "text": "Visit justoneleaf.com, and there you may:"}, {"t": "li", "text": "Hear the whole book read aloud, from the first page to the last — on your phone, on a quiet walk, or at home before Tulasi."}, {"t": "li", "text": "Keep your own notes as you listen — the lines that move you, and the small changes you resolve to make."}, {"t": "li", "text": "Write down your questions — whatever rises in your heart along the way — and gather them all in one place."}, {"t": "p", "text": "Come and sit with her a while. The door is always open — and it costs nothing at all."}]}];

/* ---------- group the flat section list into chapters (one per Part) ---------- */
var CH = (function(){
  var map={}, order=[];
  BOOK.forEach(function(s){
    if(!map[s.part]){ map[s.part]={part:s.part, pnum:s.pnum, id:'ch'+s.pnum, sections:[]}; order.push(s.part); }
    map[s.part].sections.push(s);
  });
  var arr=order.map(function(k){ return map[k]; });
  arr.forEach(function(c){ c.words=c.sections.reduce(function(a,s){ return a+s.words; },0); });
  return arr;
})();

var synth = window.speechSynthesis;
var SENT = [], idx = 0, curCh = 0, speaking = false, paused = false, gen = 0;
var voices = [], curVoice = null;

var $ = function(id){ return document.getElementById(id); };
var contentEl=$('content'), readerEl=$('reader'), coverEl=$('coverImg');
var rateEl=$('rate'), voiceEl=$('voice'), autoEl=$('autoAdv');

/* ---------- text helpers ---------- */
function splitSentences(t){
  t = (t||'').trim();
  if(!t) return [];
  var parts = t.split(/(?<=[.!?…])\s+(?=[“‘"'(A-Z])/);
  return parts.map(function(s){return s.trim();}).filter(function(s){return s.length;});
}
function mins(w){ return Math.max(1, Math.round(w/150)); }
function hasSel(){ var s=window.getSelection && window.getSelection(); return !!(s && String(s).length>0); }
function chapHead(part){
  var m = (part||'').split(' — ');
  if(m.length>=2){ return {eyebrow:m[0].replace(/^Part\b/i,'Chapter'), title:m.slice(1).join(' — ')}; }
  return {eyebrow:'', title:part};
}

/* ---------- table of contents (chapters + sections) ---------- */
function buildTOC(){
  var aside=$('toc'); var keep=aside.scrollTop; aside.innerHTML='';
  var t=document.createElement('div'); t.className='toctitle'; t.textContent='Contents'; aside.appendChild(t);
  CH.forEach(function(c, ci){
    var head=chapHead(c.part);
    var row=document.createElement('div'); row.className='tocrow'; row.dataset.ci=ci;
    if(ci===curCh) row.classList.add('active');
    var tt=document.createElement('div'); tt.className='tt';
    if(head.eyebrow){ var ce=document.createElement('span'); ce.className='ch'; ce.textContent=head.eyebrow; tt.appendChild(ce); }
    tt.appendChild(document.createTextNode(head.title));
    row.appendChild(tt);
    row.addEventListener('click', function(){ stop(); openChapter(ci); });
    aside.appendChild(row);
    c.sections.forEach(function(s){
      var sub=document.createElement('div'); sub.className='subrow'; sub.dataset.sid=s.id;
      sub.textContent=s.title;
      sub.addEventListener('click', function(e){ e.stopPropagation(); stop(); openChapter(ci, false, s.id); });
      aside.appendChild(sub);
    });
  });
  var foot=document.createElement('div'); foot.className='tocfoot';
  foot.innerHTML='<b>One Leaf Can Change Your Life</b><br>Freely given, in a spirit of devotion. Read it, hear it, and share it with anyone.';
  aside.appendChild(foot);
  aside.scrollTop=keep;
}
function markActive(){
  document.querySelectorAll('.tocrow').forEach(function(r){ r.classList.toggle('active', +r.dataset.ci===curCh); });
}

/* ---------- render one content block, pushing sentences to SENT ---------- */
function renderBlock(b){
  var el;
  if(b.t==='h3'){ el=document.createElement('h3'); }
  else if(b.t==='choice'){
    var row=document.createElement('div'); row.className='choice';
    var key='olr_pick_'+b.text.toLowerCase().replace(/[^a-z0-9]+/g,'-').slice(0,40);
    var cbx=document.createElement('input'); cbx.type='checkbox'; cbx.checked=localStorage.getItem(key)==='1';
    cbx.addEventListener('change', function(){ localStorage.setItem(key, cbx.checked?'1':'0'); });
    row.appendChild(cbx);
    var lab=document.createElement('span'); lab.className='choicelab';
    splitSentences(b.text).forEach(function(sen){
      var sp=document.createElement('span'); sp.className='snt'; sp.textContent=sen+' ';
      var rec={el:sp, text:sen};
      sp.addEventListener('click', function(){ if(hasSel())return; playFrom(SENT.indexOf(rec)); });
      lab.appendChild(sp); SENT.push(rec);
    });
    row.appendChild(lab);
    contentEl.appendChild(row); return;
  }
  else if(b.t==='li'){ el=document.createElement('div'); el.className='li'; }
  else if(b.t==='clues'){ el=document.createElement('div'); el.className='clues'; }
  else if(b.t==='write'){ el=document.createElement('div'); el.className='write'; el.textContent=b.text; contentEl.appendChild(el); return; }
  else if(b.t==='writebox'){
    var box=document.createElement('div'); box.className='writebox';
    var lab2=document.createElement('p'); lab2.className='wblabel';
    splitSentences(b.label).forEach(function(sen){
      var sp=document.createElement('span'); sp.className='snt'; sp.textContent=sen+' ';
      var rec={el:sp, text:sen};
      sp.addEventListener('click', function(){ if(hasSel())return; playFrom(SENT.indexOf(rec)); });
      lab2.appendChild(sp); SENT.push(rec);
    });
    box.appendChild(lab2);
    var pad=document.createElement('div'); pad.className='pad'; box.appendChild(pad);
    contentEl.appendChild(box); return;
  }
  else if(b.t==='verse'){
    el=document.createElement('blockquote'); el.className='sloka';
    b.lines.forEach(function(ln){ var sp=document.createElement('span'); sp.className='vl'; sp.textContent=ln; el.appendChild(sp); });
    if(b.cite){ var c=document.createElement('cite'); c.textContent=b.cite; el.appendChild(c); }
    contentEl.appendChild(el); return;
  }
  else if(b.t==='scripture'){
    el=document.createElement('blockquote'); el.className='scripture';
    splitSentences(b.text).forEach(function(sen){
      var sp=document.createElement('span'); sp.className='snt'; sp.textContent=sen+' ';
      var rec={el:sp, text:sen};
      sp.addEventListener('click', function(){ if(hasSel())return; playFrom(SENT.indexOf(rec)); });
      el.appendChild(sp); SENT.push(rec);
    });
    if(b.cite){ var c2=document.createElement('cite'); c2.textContent='— '+b.cite; el.appendChild(c2); }
    contentEl.appendChild(el); return;
  }
  else if(b.t==='bridge'){ el=document.createElement('p'); el.className='bridge'; }
  else { el=document.createElement('p'); }
  splitSentences(b.text).forEach(function(sen){
    var sp=document.createElement('span'); sp.className='snt'; sp.textContent=sen+' ';
    var rec={el:sp, text:sen};
    sp.addEventListener('click', function(){ if(hasSel())return; playFrom(SENT.indexOf(rec)); });
    el.appendChild(sp); SENT.push(rec);
  });
  contentEl.appendChild(el);
}

/* ---------- render a whole chapter (all its sections, flowing) ---------- */
function openChapter(ci, keepScroll, scrollToSid){
  curCh=ci; idx=0; var c=CH[ci]; var head=chapHead(c.part);
  coverEl.style.display = (ci===0 ? 'block' : 'none');
  $('secPart').textContent = head.eyebrow || '';
  $('secTitle').textContent = head.title;
  $('secMeta').textContent = c.sections.length+' sections · '+c.words+' words · about '+mins(c.words)+' min to hear';
  contentEl.innerHTML=''; SENT=[];
  c.sections.forEach(function(s){
    var h=document.createElement('h2'); h.className='subsec'; h.id='sub-'+s.id; h.textContent=s.title;
    contentEl.appendChild(h);
    s.blocks.forEach(renderBlock);
  });
  $('endNote').innerHTML = (ci===CH.length-1)
    ? 'Thank you for reading. <em>Hare Krishna.</em>'
    : '';
  localStorage.setItem('olr_lastch', c.id);
  $('prevSec').disabled = (ci===0);
  $('nextSec').disabled = (ci===CH.length-1);
  markActive();
  document.querySelectorAll('.subrow').forEach(function(r){ r.classList.toggle('active', scrollToSid && r.dataset.sid===scrollToSid); });
  if(scrollToSid){
    readerEl.scrollTop=0;
    var go=function(){ var t=document.getElementById('sub-'+scrollToSid); if(t) t.scrollIntoView({block:'start'}); };
    go(); if(window.requestAnimationFrame) requestAnimationFrame(go);
  } else if(keepScroll){
    var sv=parseInt(localStorage.getItem('olr_scroll_'+c.id)||'0',10);
    var doScroll=function(){ readerEl.scrollTop = sv>0 ? sv : 0; };
    doScroll(); if(window.requestAnimationFrame) requestAnimationFrame(doScroll);
  } else {
    readerEl.scrollTop=0;
  }
}

/* ---------- speech ---------- */
function clearHL(){ SENT.forEach(function(r){ r.el.classList.remove('on'); }); }
function setIcon(){ $('btnPlay').innerHTML = (speaking && !paused) ? '&#10073;&#10073; Pause' : '&#9654; Play'; }

function speakIdx(i){
  if(i>=SENT.length){
    if(autoEl.checked && curCh < CH.length-1){ openChapter(curCh+1); speakIdx(0); return; }
    speaking=false; paused=false; clearHL(); setIcon(); return;
  }
  idx=i; clearHL();
  var r=SENT[i]; r.el.classList.add('on');
  r.el.scrollIntoView({block:'center', behavior:'smooth'});
  var myGen=gen;
  var u=new SpeechSynthesisUtterance(r.text);
  u.rate=parseFloat(rateEl.value)||0.95;
  if(curVoice) u.voice=curVoice;
  u.onend=function(){ if(myGen===gen && speaking && !paused) speakIdx(idx+1); };
  u.onerror=function(){ if(myGen===gen && speaking && !paused) speakIdx(idx+1); };
  speaking=true; paused=false; setIcon();
  synth.speak(u);
}
function playFrom(i){ if(!('speechSynthesis' in window))return; gen++; synth.cancel(); clearHL(); paused=false; speaking=true; speakIdx(i<0?0:i); }
function togglePlay(){
  if(!('speechSynthesis' in window))return;
  if(speaking && !paused){ synth.pause(); paused=true; setIcon(); }
  else if(speaking && paused){ synth.resume(); paused=false; setIcon(); }
  else { playFrom(idx||0); }
}
function stop(){ gen++; speaking=false; paused=false; synth.cancel(); clearHL(); setIcon(); }

/* ---------- voices ---------- */
function loadVoices(){
  var all=synth.getVoices();
  voices = all.filter(function(v){ return /^en/i.test(v.lang); });
  if(!voices.length) voices=all;
  voiceEl.innerHTML='';
  voices.forEach(function(v){ var o=document.createElement('option'); o.value=v.name; o.textContent=v.name.replace(/Microsoft |Google /,'')+' ('+v.lang+')'; voiceEl.appendChild(o); });
  var saved=localStorage.getItem('olr_voice');
  var pick = voices.filter(function(v){return v.name===saved;})[0]
        || voices.filter(function(v){return /en-IN/i.test(v.lang);})[0]
        || voices.filter(function(v){return /en-GB/i.test(v.lang);})[0]
        || voices[0];
  if(pick){ curVoice=pick; voiceEl.value=pick.name; }
}

/* ---------- wires ---------- */
$('btnPlay').onclick=togglePlay;
$('btnStop').onclick=stop;
$('btnNextS').onclick=function(){ playFrom(Math.min(idx+1, SENT.length-1)); };
$('btnPrevS').onclick=function(){ playFrom(Math.max(idx-1, 0)); };
$('prevSec').onclick=function(){ if(curCh>0){ stop(); openChapter(curCh-1); } };
$('nextSec').onclick=function(){ if(curCh<CH.length-1){ stop(); openChapter(curCh+1); } };
rateEl.oninput=function(){ localStorage.setItem('olr_rate', rateEl.value); };
voiceEl.onchange=function(){ curVoice=voices.filter(function(v){return v.name===voiceEl.value;})[0]; localStorage.setItem('olr_voice', voiceEl.value); };
autoEl.onchange=function(){ localStorage.setItem('olr_auto', autoEl.checked?'1':'0'); };
var tocEl=$('toc');
if($('btnToc')) $('btnToc').onclick=function(){ var op=tocEl.classList.toggle('open'); if(op && window.innerWidth<=760) window.scrollTo(0,0); };
tocEl.addEventListener('click', function(e){ if(window.innerWidth<=760 && (e.target.closest('.tocrow')||e.target.closest('.subrow'))){ tocEl.classList.remove('open'); window.scrollTo(0,0); } });

document.addEventListener('keydown', function(e){
  var tag=e.target.tagName;
  if(tag==='TEXTAREA'||tag==='INPUT'||tag==='SELECT') return;
  if(e.code==='Space'){ e.preventDefault(); togglePlay(); }
  else if(e.code==='ArrowRight'){ e.preventDefault(); playFrom(Math.min(idx+1, SENT.length-1)); }
  else if(e.code==='ArrowLeft'){ e.preventDefault(); playFrom(Math.max(idx-1, 0)); }
});

/* ---------- remember scroll position (per chapter) ---------- */
var scrollT;
readerEl.addEventListener('scroll', function(){
  clearTimeout(scrollT);
  scrollT=setTimeout(function(){
    if(CH[curCh]) localStorage.setItem('olr_scroll_'+CH[curCh].id, readerEl.scrollTop);
  }, 200);
});
window.addEventListener('beforeunload', function(){
  if(CH[curCh]) localStorage.setItem('olr_scroll_'+CH[curCh].id, readerEl.scrollTop);
});

/* ---------- init ---------- */
